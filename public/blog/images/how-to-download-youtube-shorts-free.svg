<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#1a0a0a" />
  <rect x="800" y="100" width="8" height="430" rx="4" fill="#FF000015" /><rect x="860" y="160" width="8" height="370" rx="4" fill="#FF00000a" /><rect x="920" y="200" width="8" height="330" rx="4" fill="#FF000015" /><rect x="980" y="140" width="8" height="390" rx="4" fill="#FF00000a" /><rect x="1040" y="180" width="8" height="350" rx="4" fill="#FF000015" /><rect x="1100" y="120" width="8" height="410" rx="4" fill="#FF00000a" />
  <!-- Accent glow -->
  <defs>
    <radialGradient id="glow">
      <stop offset="0%" stop-color="#FF0000" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#FF0000" stop-opacity="0" />
    </radialGradient>
  </defs>
  <ellipse cx="300" cy="315" rx="400" ry="300" fill="url(#glow)" />
  <!-- Icon badge -->
  <rect x="80" y="80" width="100" height="100" rx="24" fill="#FF0000" />
  <text x="130" y="148" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="42" fill="white">▶</text>
  <!-- Title -->
  <text x="80" y="280" font-family="sans-serif" font-weight="bold" font-size="72" fill="white">Download</text>
  <text x="80" y="370" font-family="sans-serif" font-weight="bold" font-size="72" fill="#FF0000">YouTube Shorts</text>
  <!-- Divider -->
  <rect x="80" y="400" width="200" height="4" rx="2" fill="#FF0000" opacity="0.6" />
  <!-- Subtitle -->
  <text x="80" y="440" font-family="sans-serif" font-size="24" fill="#888888">Free online tool at loveconverts.com</text>
  <!-- Brand -->
  <text x="1120" y="600" text-anchor="end" font-family="sans-serif" font-weight="bold" font-size="18" fill="#555555">LoveConverts</text>
</svg>