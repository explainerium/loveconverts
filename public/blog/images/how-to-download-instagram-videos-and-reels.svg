<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="igGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCAF45"/>
      <stop offset="25%" style="stop-color:#F77737"/>
      <stop offset="50%" style="stop-color:#F56040"/>
      <stop offset="65%" style="stop-color:#FD1D1D"/>
      <stop offset="80%" style="stop-color:#E1306C"/>
      <stop offset="90%" style="stop-color:#C13584"/>
      <stop offset="100%" style="stop-color:#833AB4"/>
    </linearGradient>
    <linearGradient id="igGradLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FCAF45;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#F56040;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#833AB4;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background with Instagram gradient -->
  <rect width="1200" height="630" fill="url(#igGrad)"/>
  <!-- Overlay for depth -->
  <rect width="1200" height="630" fill="#000000" opacity="0.3"/>
  <!-- Decorative large circles -->
  <circle cx="200" cy="500" r="250" fill="#FFFFFF" opacity="0.03"/>
  <circle cx="1000" cy="150" r="200" fill="#FFFFFF" opacity="0.03"/>
  <!-- Title -->
  <text x="600" y="110" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Download Instagram</text>
  <text x="600" y="175" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Reels</text>
  <text x="600" y="215" font-family="Arial, sans-serif" font-size="22" fill="#FFFFFF" text-anchor="middle" opacity="0.8">Save videos and reels in HD quality</text>
  <!-- Camera/Instagram icon -->
  <g transform="translate(480, 270)">
    <!-- Outer rounded square -->
    <rect x="0" y="0" width="120" height="120" rx="30" fill="none" stroke="#FFFFFF" stroke-width="5"/>
