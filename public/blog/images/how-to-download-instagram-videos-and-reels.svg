    <circle cx="60" cy="60" r="30" fill="none" stroke="#FFFFFF" stroke-width="4"/>
    <!-- Flash dot -->
    <circle cx="95" cy="25" r="7" fill="#FFFFFF"/>
    <!-- Inner dot -->
    <circle cx="60" cy="60" r="8" fill="#FFFFFF" opacity="0.4"/>
  </g>
  <!-- Play button overlay on camera -->
