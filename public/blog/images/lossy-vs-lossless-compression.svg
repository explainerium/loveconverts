<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Split design: dark left, light right -->
  <rect x="0" y="0" width="600" height="630" fill="#111827"/>
  <rect x="600" y="0" width="600" height="630" fill="#F3F4F6"/>
  <!-- VS divider -->
  <circle cx="600" cy="315" r="45" fill="#FF4747"/>
  <text x="600" y="328" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">VS</text>
  <!-- LOSSY side (dark) -->
  <text x="300" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FF4747" text-anchor="middle">LOSSY</text>
  <!-- Quality meter - lower -->
  <rect x="120" y="180" width="360" height="16" rx="8" fill="#1F2937"/>
  <rect x="120" y="180" width="216" height="16" rx="8" fill="#F59E0B"/>
  <text x="120" y="220" font-family="Arial, sans-serif" font-size="16" fill="#6B7280">Quality: 60%</text>
  <!-- Lossy visual: degraded squares -->
  <rect x="140" y="260" width="80" height="80" rx="4" fill="#374151"/>
  <rect x="240" y="260" width="80" height="80" rx="4" fill="#4B5563"/>
  <rect x="340" y="260" width="80" height="80" rx="4" fill="#374151"/>
  <rect x="140" y="360" width="80" height="80" rx="4" fill="#4B5563"/>
  <rect x="240" y="360" width="80" height="80" rx="4" fill="#374151"/>
  <rect x="340" y="360" width="80" height="80" rx="4" fill="#4B5563"/>
  <!-- Artifacts dots -->
  <circle cx="180" cy="300" r="4" fill="#F59E0B" opacity="0.5"/>
  <circle cx="260" cy="320" r="3" fill="#F59E0B" opacity="0.4"/>
  <circle cx="370" cy="290" r="5" fill="#F59E0B" opacity="0.3"/>
  <!-- File size -->
  <rect x="200" y="480" width="200" height="44" rx="22" fill="#10B981"/>
  <text x="300" y="508" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">200 KB</text>
  <text x="300" y="550" font-family="Arial, sans-serif" font-size="16" fill="#6B7280" text-anchor="middle">JPG, WebP, AVIF</text>
  <!-- LOSSLESS side (light) -->
  <text x="900" y="120" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#10B981" text-anchor="middle">LOSSLESS</text>
  <!-- Quality meter - full -->
  <rect x="720" y="180" width="360" height="16" rx="8" fill="#E5E7EB"/>
  <rect x="720" y="180" width="360" height="16" rx="8" fill="#10B981"/>
  <text x="720" y="220" font-family="Arial, sans-serif" font-size="16" fill="#6B7280">Quality: 100%</text>
  <!-- Lossless visual: clean squares -->
  <rect x="740" y="260" width="80" height="80" rx="4" fill="#D1D5DB"/>
  <rect x="840" y="260" width="80" height="80" rx="4" fill="#E5E7EB"/>
  <rect x="940" y="260" width="80" height="80" rx="4" fill="#D1D5DB"/>
  <rect x="740" y="360" width="80" height="80" rx="4" fill="#E5E7EB"/>
  <rect x="840" y="360" width="80" height="80" rx="4" fill="#D1D5DB"/>
  <rect x="940" y="360" width="80" height="80" rx="4" fill="#E5E7EB"/>
  <!-- File size -->
  <rect x="800" y="480" width="200" height="44" rx="22" fill="#6B7280"/>
  <text x="900" y="508" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">2.4 MB</text>
  <text x="900" y="550" font-family="Arial, sans-serif" font-size="16" fill="#9CA3AF" text-anchor="middle">PNG, TIFF, BMP</text>
  <!-- Branding -->
  <text x="1150" y="605" font-family="Arial, sans-serif" font-size="18" fill="#9CA3AF" text-anchor="end">LoveConverts</text>
</svg>