<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="tanbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78716C"/>
      <stop offset="100%" style="stop-color:#A8A29E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#tanbg)"/>
  <!-- Professional texture lines -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#57534E" stroke-width="6"/>
  <line x1="0" y1="624" x2="1200" y2="624" stroke="#57534E" stroke-width="6"/>
  <!-- Diagonal lines -->
  <line x1="0" y1="630" x2="300" y2="0" stroke="#6B7280" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="630" x2="500" y2="0" stroke="#6B7280" stroke-width="1" opacity="0.15"/>
  <line x1="700" y1="630" x2="1000" y2="0" stroke="#6B7280" stroke-width="1" opacity="0.15"/>
  <line x1="900" y1="630" x2="1200" y2="0" stroke="#6B7280" stroke-width="1" opacity="0.15"/>
  <!-- TIFF format badge -->
  <rect x="120" y="200" width="220" height="130" rx="16" fill="#44403C"/>
  <rect x="130" y="210" width="200" height="110" rx="12" fill="#57534E"/>
  <text x="230" y="282" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#D6D3D1" text-anchor="middle">TIFF</text>
  <!-- File info -->
  <text x="230" y="365" font-family="Arial, sans-serif" font-size="16" fill="#D6D3D1" text-anchor="middle">Uncompressed</text>
  <text x="230" y="390" font-family="Arial, sans-serif" font-size="16" fill="#D6D3D1" text-anchor="middle">~25 MB per image</text>
  <!-- Arrow -->
  <line x1="390" y1="265" x2="520" y2="265" stroke="#FF4747" stroke-width="6" stroke-linecap="round"/>
  <polygon points="515,248 555,265 515,282" fill="#FF4747"/>
  <!-- JPG format badge -->
  <rect x="580" y="200" width="220" height="130" rx="16" fill="#FF4747"/>
  <rect x="590" y="210" width="200" height="110" rx="12" fill="#EF4444"/>
  <text x="690" y="282" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle">JPG</text>
  <!-- File info -->
  <text x="690" y="365" font-family="Arial, sans-serif" font-size="16" fill="#fff" text-anchor="middle">Compressed</text>
  <text x="690" y="390" font-family="Arial, sans-serif" font-size="16" fill="#FEE2E2" text-anchor="middle">~500 KB per image</text>
  <!-- Size reduction visual -->
  <rect x="180" y="440" width="550" height="12" rx="6" fill="#44403C"/>
  <rect x="180" y="440" width="550" height="12" rx="6" fill="#D6D3D1" opacity="0.3"/>
  <rect x="180" y="460" width="550" height="12" rx="6" fill="#44403C"/>
  <rect x="180" y="460" width="30" height="12" rx="6" fill="#FF4747"/>
  <text x="240" y="472" font-family="Arial, sans-serif" font-size="12" fill="#D6D3D1">98% smaller</text>
  <!-- Title -->
  <text x="1020" y="250" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#fff" text-anchor="middle">TIFF</text>
  <text x="1020" y="325" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#fff" text-anchor="middle">to JPG</text>
  <text x="1020" y="385" font-family="Arial, sans-serif" font-size="22" fill="#E7E5E4" text-anchor="middle">Professional Conversion</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#57534E" text-anchor="end">LoveConverts</text>
</svg>