<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#1A1A1A"/>
  <!-- Red gradient accent strip -->
  <rect x="0" y="0" width="1200" height="8" fill="#FF0000"/>
  <!-- Large play button -->
  <rect x="350" y="180" width="500" height="280" rx="20" fill="#282828"/>
  <rect x="370" y="200" width="460" height="240" rx="10" fill="#333"/>
  <!-- Play button circle -->
  <circle cx="600" cy="320" r="50" fill="#FF0000"/>
  <polygon points="585,295 585,345 625,320" fill="#fff"/>
  <!-- Download arrow below -->
  <line x1="600" y1="480" x2="600" y2="540" stroke="#FF4747" stroke-width="5"/>
  <polygon points="575,535 600,560 625,535" fill="#FF4747"/>
  <line x1="560" y1="565" x2="640" y2="565" stroke="#FF4747" stroke-width="4" stroke-linecap="round"/>
  <!-- Title - left side -->
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#fff" text-anchor="start" transform="rotate(-90, 100, 280)">DOWNLOAD</text>
  <!-- Title - right side -->
  <text x="950" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">Download</text>
  <text x="950" y="285" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#FF0000" text-anchor="middle">YouTube</text>
  <text x="950" y="350" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#fff" text-anchor="middle">Videos</text>
  <rect x="880" y="380" width="140" height="40" rx="20" fill="#FF4747"/>
  <text x="950" y="407" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">FREE</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#666" text-anchor="end">LoveConverts</text>
</svg>