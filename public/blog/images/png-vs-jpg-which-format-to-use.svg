<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Left half - PNG (green) -->
  <rect x="0" y="0" width="600" height="630" fill="#1B5E20"/>
  <!-- Right half - JPG (amber) -->
  <rect x="600" y="0" width="600" height="630" fill="#E65100"/>
  <!-- Overlay patterns -->
  <!-- PNG side: transparency grid pattern -->
  <rect x="60" y="300" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="80" y="320" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="100" y="300" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="120" y="320" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="140" y="300" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="60" y="340" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="100" y="340" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <rect x="140" y="340" width="20" height="20" fill="#FFFFFF" opacity="0.08"/>
  <!-- JPG side: photo-like shapes -->
  <circle cx="1000" cy="320" r="40" fill="#FFFFFF" opacity="0.06"/>
  <rect x="950" y="350" width="100" height="60" rx="4" fill="#FFFFFF" opacity="0.06"/>
  <!-- Center divider -->
  <rect x="594" y="0" width="12" height="630" fill="#FFFFFF" opacity="0.15"/>
  <!-- VS circle -->
  <circle cx="600" cy="315" r="50" fill="#FF4747"/>
  <text x="600" y="328" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VS</text>
  <!-- Main title -->
  <text x="600" y="80" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="middle">PNG vs JPG</text>
  <text x="600" y="130" font-family="Arial, sans-serif" font-size="24" fill="#FFFFFF" text-anchor="middle" opacity="0.8">Which Format Should You Use?</text>
  <!-- PNG side content -->
  <text x="300" y="230" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.9">.PNG</text>
  <!-- PNG features -->
  <rect x="160" y="400" width="280" height="44" rx="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="300" y="428" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Transparency Support</text>
  <rect x="160" y="455" width="280" height="44" rx="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="300" y="483" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Lossless Compression</text>
  <rect x="160" y="510" width="280" height="44" rx="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="300" y="538" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Larger File Size</text>
  <!-- JPG side content -->
  <text x="900" y="230" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.9">.JPG</text>
  <!-- JPG features -->
  <rect x="760" y="400" width="280" height="44" rx="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="900" y="428" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Universal Compatibility</text>
  <rect x="760" y="455" width="280" height="44" rx="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="900" y="483" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Lossy Compression</text>
  <rect x="760" y="510" width="280" height="44" rx="22" fill="#FFFFFF" opacity="0.15"/>
  <text x="900" y="538" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">Smaller File Size</text>
  <!-- Branding -->
  <text x="1160" y="600" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="end" opacity="0.7">LoveConverts</text>
</svg>