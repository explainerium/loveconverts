<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0F172A"/>
  <!-- Diagonal accent line -->
  <line x1="0" y1="630" x2="1200" y2="0" stroke="#FF4747" stroke-width="2" opacity="0.1"/>
  <line x1="200" y1="630" x2="1200" y2="100" stroke="#FF4747" stroke-width="1" opacity="0.08"/>
  <!-- Small blurry image -->
  <rect x="120" y="200" width="160" height="160" rx="8" fill="#1E293B" stroke="#334155" stroke-width="2"/>
  <!-- Pixelated grid inside small image -->
  <rect x="130" y="210" width="20" height="20" fill="#4B5563"/>
  <rect x="150" y="210" width="20" height="20" fill="#6B7280"/>
  <rect x="170" y="210" width="20" height="20" fill="#4B5563"/>
  <rect x="190" y="210" width="20" height="20" fill="#9CA3AF"/>
  <rect x="210" y="210" width="20" height="20" fill="#6B7280"/>
  <rect x="230" y="210" width="20" height="20" fill="#4B5563"/>
  <rect x="250" y="210" width="20" height="20" fill="#374151"/>
  <rect x="130" y="230" width="20" height="20" fill="#6B7280"/>
  <rect x="150" y="230" width="20" height="20" fill="#9CA3AF"/>
  <rect x="170" y="230" width="20" height="20" fill="#D1D5DB"/>
  <rect x="190" y="230" width="20" height="20" fill="#9CA3AF"/>
  <rect x="210" y="230" width="20" height="20" fill="#D1D5DB"/>
  <rect x="230" y="230" width="20" height="20" fill="#6B7280"/>
  <rect x="250" y="230" width="20" height="20" fill="#4B5563"/>
  <rect x="130" y="250" width="20" height="20" fill="#4B5563"/>
  <rect x="150" y="250" width="20" height="20" fill="#6B7280"/>
  <rect x="170" y="250" width="20" height="20" fill="#9CA3AF"/>
  <rect x="190" y="250" width="20" height="20" fill="#D1D5DB"/>
  <rect x="210" y="250" width="20" height="20" fill="#9CA3AF"/>
  <rect x="230" y="250" width="20" height="20" fill="#4B5563"/>
  <rect x="250" y="250" width="20" height="20" fill="#374151"/>
  <text x="200" y="330" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">200x200</text>
  <!-- Magnifying glass -->
  <circle cx="420" cy="280" r="60" fill="none" stroke="#FF4747" stroke-width="4"/>
  <line x1="460" y1="320" x2="500" y2="360" stroke="#FF4747" stroke-width="6" stroke-linecap="round"/>
  <!-- Sharp detail inside magnifier -->
  <circle cx="410" cy="270" r="8" fill="#10B981"/>
  <rect x="420" y="275" width="20" height="3" rx="1" fill="#fff" opacity="0.8"/>
  <rect x="400" y="285" width="30" height="3" rx="1" fill="#fff" opacity="0.6"/>
  <!-- Large sharp image -->
  <rect x="540" y="140" width="280" height="280" rx="12" fill="#1E293B" stroke="#10B981" stroke-width="3"/>
  <!-- Smooth gradient representation inside -->
  <rect x="555" y="155" width="250" height="200" rx="6" fill="#374151"/>
  <circle cx="610" cy="200" r="25" fill="#FBBF24"/>
  <path d="M555,310 L620,240 L680,280 L740,220 L805,310" fill="none" stroke="#10B981" stroke-width="3"/>
  <rect x="570" y="370" width="80" height="25" rx="6" fill="#10B981"/>
  <text x="610" y="388" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">SHARP</text>
  <text x="680" y="400" font-family="Arial, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">1600x1600</text>
  <!-- Title -->
  <text x="1000" y="240" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle">Upscale</text>
  <text x="1000" y="310" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FF4747" text-anchor="middle">Images</text>
  <text x="1000" y="370" font-family="Arial, sans-serif" font-size="24" fill="#64748B" text-anchor="middle">Without Losing Quality</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#475569" text-anchor="end">LoveConverts</text>
</svg>