<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#111827"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid7" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="none" stroke="#1F2937" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid7)"/>
  <!-- Image stack -->
  <rect x="120" y="200" width="150" height="110" rx="8" fill="#374151" stroke="#10B981" stroke-width="2" transform="rotate(-8, 195, 255)"/>
  <rect x="140" y="180" width="150" height="110" rx="8" fill="#4B5563" stroke="#10B981" stroke-width="2" transform="rotate(-3, 215, 235)"/>
  <rect x="160" y="160" width="150" height="110" rx="8" fill="#6B7280" stroke="#10B981" stroke-width="2"/>
  <!-- Mini landscape in top image -->
  <circle cx="200" cy="190" r="12" fill="#FBBF24"/>
  <polyline points="170,250 200,210 230,235 260,200 300,250" fill="none" stroke="#10B981" stroke-width="2"/>
  <!-- Merge arrows -->
  <path d="M340,200 L420,280" stroke="#10B981" stroke-width="3" stroke-dasharray="6,4"/>
  <path d="M340,240 L420,280" stroke="#10B981" stroke-width="3" stroke-dasharray="6,4"/>
  <path d="M340,280 L420,280" stroke="#10B981" stroke-width="3" stroke-dasharray="6,4"/>
  <polygon points="418,268 445,280 418,292" fill="#10B981"/>
  <!-- PDF icon result -->
  <rect x="460" y="190" width="160" height="200" rx="10" fill="#fff"/>
  <path d="M580,190 L620,230 L620,190 Z" fill="#ddd"/>
  <rect x="480" y="230" width="100" height="10" rx="3" fill="#E5E7EB"/>
  <rect x="480" y="250" width="80" height="10" rx="3" fill="#E5E7EB"/>
  <rect x="480" y="280" width="120" height="70" rx="4" fill="#D1FAE5"/>
  <rect x="490" y="360" width="90" height="8" rx="2" fill="#E5E7EB"/>
  <text x="540" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10B981" text-anchor="middle">IMG</text>
  <!-- Green "PDF" label -->
  <rect x="500" y="145" width="80" height="36" rx="8" fill="#10B981"/>
  <text x="540" y="170" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#fff" text-anchor="middle">PDF</text>
  <!-- Title -->
  <text x="880" y="230" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#fff" text-anchor="middle">Images</text>
  <text x="880" y="305" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#10B981" text-anchor="middle">to PDF</text>
  <text x="880" y="370" font-family="Arial, sans-serif" font-size="24" fill="#9CA3AF" text-anchor="middle">Merge &amp; Create in Seconds</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#6B7280" text-anchor="end">LoveConverts</text>
</svg>