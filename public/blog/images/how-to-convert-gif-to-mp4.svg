<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="gifbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EC4899"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#gifbg)"/>
  <!-- Animated-feeling motion lines -->
  <line x1="50" y1="100" x2="200" y2="100" stroke="#fff" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="80" y1="140" x2="180" y2="140" stroke="#fff" stroke-width="2" opacity="0.1" stroke-linecap="round"/>
  <line x1="30" y1="180" x2="160" y2="180" stroke="#fff" stroke-width="2" opacity="0.12" stroke-linecap="round"/>
  <line x1="1000" y1="450" x2="1150" y2="450" stroke="#fff" stroke-width="3" opacity="0.15" stroke-linecap="round"/>
  <line x1="1020" y1="490" x2="1130" y2="490" stroke="#fff" stroke-width="2" opacity="0.1" stroke-linecap="round"/>
  <!-- GIF badge - animated feel with stacked frames -->
  <rect x="130" y="210" width="200" height="150" rx="12" fill="#fff" opacity="0.1" transform="rotate(-5, 230, 285)"/>
  <rect x="140" y="200" width="200" height="150" rx="12" fill="#fff" opacity="0.15" transform="rotate(-2, 240, 275)"/>
  <rect x="150" y="190" width="200" height="150" rx="12" fill="#fff" opacity="0.25"/>
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#EC4899" text-anchor="middle">GIF</text>
  <!-- Looping arrows around GIF -->
  <path d="M160,360 Q160,400 200,400" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
  <polygon points="198,392 210,400 198,408" fill="#fff" opacity="0.4"/>
  <text x="250" y="400" font-family="Arial, sans-serif" font-size="14" fill="#fff" opacity="0.5">looping...</text>
  <!-- Morphing arrow -->
  <path d="M400,280 C450,280 480,280 520,280" stroke="#FF4747" stroke-width="6" stroke-linecap="round" stroke-dasharray="12,6"/>
  <polygon points="518,265 550,280 518,295" fill="#FF4747"/>
  <!-- MP4 badge - clean single frame with play -->
  <rect x="580" y="190" width="240" height="160" rx="14" fill="#1E1B4B"/>
  <rect x="595" y="205" width="210" height="120" rx="8" fill="#312E81"/>
  <!-- Play triangle -->
  <polygon points="680,245 680,285 720,265" fill="#fff" opacity="0.9"/>
  <!-- Progress bar -->
  <rect x="595" y="340" width="210" height="4" rx="2" fill="#4C1D95"/>
  <rect x="595" y="340" width="130" height="4" rx="2" fill="#FF4747"/>
  <circle cx="725" cy="342" r="6" fill="#FF4747"/>
  <text x="700" y="380" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#fff" text-anchor="middle">MP4</text>
  <!-- Title -->
  <text x="1010" y="250" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#fff" text-anchor="middle">GIF</text>
  <text x="1010" y="315" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#fff" text-anchor="middle">to</text>
  <text x="1010" y="380" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#FF4747" text-anchor="middle">MP4</text>
  <text x="1010" y="430" font-family="Arial, sans-serif" font-size="20" fill="#DDD6FE" text-anchor="middle">Smaller &amp; Smoother</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#C4B5FD" text-anchor="end" opacity="0.7">LoveConverts</text>
</svg>