  <!-- Progress time -->
  <text x="150" y="510" font-family="Arial, sans-serif" font-size="16" fill="#FFE0CC" opacity="0.8">1:47</text>
  <text x="1050" y="510" font-family="Arial, sans-serif" font-size="16" fill="#FFE0CC" text-anchor="end" opacity="0.5">4:23</text>

  <!-- DOWNLOAD BUTTON -->
