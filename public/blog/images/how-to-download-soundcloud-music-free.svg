<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="scBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5500"/>
      <stop offset="100%" style="stop-color:#FF8800"/>
    </linearGradient>
    <linearGradient id="scDark" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#CC4400"/>
      <stop offset="100%" style="stop-color:#FF5500"/>
    </linearGradient>
  </defs>

  <!-- Orange gradient background -->
  <rect width="1200" height="630" fill="url(#scBg)"/>

  <!-- Decorative large circles -->
