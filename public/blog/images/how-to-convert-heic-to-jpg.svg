<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B21A8"/>
      <stop offset="100%" style="stop-color:#9333EA"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="150" cy="500" r="200" fill="#7C3AED" opacity="0.3"/>
  <circle cx="1050" cy="130" r="180" fill="#A855F7" opacity="0.2"/>
  <!-- iPhone outline -->
  <rect x="160" y="160" width="140" height="260" rx="20" fill="none" stroke="#fff" stroke-width="4"/>
  <rect x="175" y="185" width="110" height="200" rx="4" fill="#fff" opacity="0.15"/>
  <circle cx="230" cy="405" r="12" fill="none" stroke="#fff" stroke-width="2"/>
  <text x="230" y="295" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#fff" text-anchor="middle">HEIC</text>
  <!-- Arrow -->
  <line x1="340" y1="290" x2="460" y2="290" stroke="#FF4747" stroke-width="6" stroke-linecap="round"/>
  <polygon points="460,270 500,290 460,310" fill="#FF4747"/>
  <!-- JPG badge -->
  <rect x="520" y="240" width="140" height="100" rx="16" fill="#FF4747"/>
  <text x="590" y="302" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#fff" text-anchor="middle">JPG</text>
  <!-- Title -->
  <text x="880" y="240" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#fff" text-anchor="middle">HEIC</text>
  <text x="880" y="310" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="#fff" text-anchor="middle">to JPG</text>
  <text x="880" y="370" font-family="Arial, sans-serif" font-size="24" fill="#E9D5FF" text-anchor="middle">The Complete Guide</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#E9D5FF" text-anchor="end" opacity="0.8">LoveConverts</text>
</svg>