<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#F5F5F5"/>
  <!-- Subtle grid -->
  <g opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#000" stroke-width="1"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#000" stroke-width="1"/>
  </g>
  <!-- Title -->
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#1A1A2E" text-anchor="middle">Crop Photos</text>
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="36" fill="#FF4747" text-anchor="middle" font-weight="bold">Online Free</text>
  <!-- Photo frame (outer) with dimmed area -->
  <rect x="300" y="190" width="600" height="360" rx="8" fill="#DDDDDD"/>
  <!-- Simulated photo content -->
  <rect x="300" y="190" width="600" height="360" rx="8" fill="#C8D8E8"/>
  <!-- Sky -->
  <rect x="300" y="190" width="600" height="180" rx="8" fill="#87CEEB" opacity="0.4"/>
  <!-- Sun -->
  <circle cx="750" cy="250" r="30" fill="#FFD700" opacity="0.4"/>
  <!-- Mountains -->
  <polygon points="300,450 450,280 600,450" fill="#6B8E6B" opacity="0.3"/>
  <polygon points="500,450 680,300 900,450" fill="#5A7D5A" opacity="0.3"/>
  <!-- Dim overlay outside crop area -->
  <rect x="300" y="190" width="600" height="360" rx="8" fill="#000000" opacity="0.4"/>
  <!-- Crop area (bright/clear) -->
  <rect x="420" y="250" width="360" height="240" fill="#C8D8E8"/>
  <rect x="420" y="250" width="360" height="120" fill="#87CEEB" opacity="0.4"/>
  <circle cx="700" cy="290" r="22" fill="#FFD700" opacity="0.5"/>
  <polygon points="420,430 520,310 620,430" fill="#6B8E6B" opacity="0.4"/>
  <polygon points="550,430 660,330 780,430" fill="#5A7D5A" opacity="0.4"/>
  <!-- Crop border -->
  <rect x="420" y="250" width="360" height="240" fill="none" stroke="#FF4747" stroke-width="3"/>
  <!-- Rule of thirds lines -->
  <line x1="540" y1="250" x2="540" y2="490" stroke="#FF4747" stroke-width="1" opacity="0.4" stroke-dasharray="6,4"/>
  <line x1="660" y1="250" x2="660" y2="490" stroke="#FF4747" stroke-width="1" opacity="0.4" stroke-dasharray="6,4"/>
  <line x1="420" y1="330" x2="780" y2="330" stroke="#FF4747" stroke-width="1" opacity="0.4" stroke-dasharray="6,4"/>
  <line x1="420" y1="410" x2="780" y2="410" stroke="#FF4747" stroke-width="1" opacity="0.4" stroke-dasharray="6,4"/>
  <!-- Corner handles -->
  <!-- Top-left -->
  <rect x="412" y="242" width="24" height="5" fill="#FF4747"/>
  <rect x="412" y="242" width="5" height="24" fill="#FF4747"/>
  <!-- Top-right -->
  <rect x="764" y="242" width="24" height="5" fill="#FF4747"/>
  <rect x="783" y="242" width="5" height="24" fill="#FF4747"/>
  <!-- Bottom-left -->
  <rect x="412" y="483" width="24" height="5" fill="#FF4747"/>
  <rect x="412" y="466" width="5" height="22" fill="#FF4747"/>
  <!-- Bottom-right -->
  <rect x="764" y="483" width="24" height="5" fill="#FF4747"/>
  <rect x="783" y="466" width="5" height="22" fill="#FF4747"/>
  <!-- Dimension labels -->
  <rect x="530" y="497" width="140" height="30" rx="15" fill="#FF4747"/>
  <text x="600" y="518" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="bold">360 x 240 px</text>
  <!-- Subtitle -->
  <text x="600" y="585" font-family="Arial, sans-serif" font-size="18" fill="#888888" text-anchor="middle">Precise cropping with rule-of-thirds guides</text>
  <!-- Branding -->
  <text x="1160" y="600" font-family="Arial, sans-serif" font-size="16" fill="#FF4747" text-anchor="end" opacity="0.8">LoveConverts</text>
</svg>