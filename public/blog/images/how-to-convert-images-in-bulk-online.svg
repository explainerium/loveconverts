<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f1f35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#blueGrad8)"/>
  <!-- Subtle light rays -->
  <polygon points="600,0 400,630 800,630" fill="#FFFFFF" opacity="0.01"/>
  <polygon points="600,0 200,630 1000,630" fill="#FFFFFF" opacity="0.008"/>
  <!-- Title -->
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Batch Image</text>
  <text x="600" y="155" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#FF4747" text-anchor="middle">Conversion</text>
  <text x="600" y="195" font-family="Arial, sans-serif" font-size="20" fill="#7799BB" text-anchor="middle">Convert hundreds of images at once</text>
  <!-- Grid of image thumbnails -->
  <!-- Row 1 -->
  <g transform="translate(180, 240)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <polygon points="15,80 45,50 70,70 95,40 115,80" fill="#4A90D9" opacity="0.3"/>
    <circle cx="35" cy="30" r="12" fill="#FFD700" opacity="0.3"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.PNG</text>
  </g>
  <g transform="translate(330, 240)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <polygon points="15,80 50,45 85,65 115,80" fill="#4A90D9" opacity="0.3"/>
    <circle cx="100" cy="30" r="12" fill="#FFD700" opacity="0.3"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.WEBP</text>
  </g>
  <g transform="translate(480, 240)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <rect x="20" y="20" width="90" height="60" rx="4" fill="#4A90D9" opacity="0.15"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.BMP</text>
  </g>
  <g transform="translate(630, 240)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <polygon points="25,80 55,35 85,60 115,80" fill="#4A90D9" opacity="0.3"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.TIFF</text>
  </g>
  <g transform="translate(780, 240)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <circle cx="65" cy="45" r="25" fill="#4A90D9" opacity="0.15"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.GIF</text>
  </g>
  <!-- Row 2 -->
  <g transform="translate(180, 360)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <circle cx="40" cy="35" r="15" fill="#4A90D9" opacity="0.15"/>
    <rect x="65" y="25" width="50" height="50" rx="4" fill="#4A90D9" opacity="0.15"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.SVG</text>
  </g>
  <g transform="translate(330, 360)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#2A4A70" stroke="#3A6090" stroke-width="1.5"/>
    <polygon points="20,80 65,30 110,80" fill="#4A90D9" opacity="0.3"/>
    <text x="65" y="94" font-family="Arial, sans-serif" font-size="10" fill="#7799BB" text-anchor="middle">.HEIC</text>
  </g>
  <!-- Big arrow pointing to output -->
  <g transform="translate(510, 380)">
    <line x1="0" y1="30" x2="70" y2="30" stroke="#FF4747" stroke-width="4" stroke-linecap="round"/>
    <polygon points="75,30 60,18 60,42" fill="#FF4747"/>
  </g>
  <!-- Output stack -->
  <g transform="translate(630, 360)">
    <rect x="6" y="6" width="130" height="100" rx="8" fill="#1A3050" stroke="#FF4747" stroke-width="1" opacity="0.4"/>
    <rect x="3" y="3" width="130" height="100" rx="8" fill="#1E3555" stroke="#FF4747" stroke-width="1" opacity="0.6"/>
    <rect x="0" y="0" width="130" height="100" rx="8" fill="#223B5E" stroke="#FF4747" stroke-width="2"/>
    <text x="65" y="45" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FF4747" text-anchor="middle">.JPG</text>
    <text x="65" y="70" font-family="Arial, sans-serif" font-size="12" fill="#7799BB" text-anchor="middle">Converted</text>
    <!-- Checkmark -->
    <circle cx="105" cy="20" r="14" fill="#4CAF50"/>
    <polyline points="98,20 103,25 113,15" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Counter badge -->
  <rect x="790" y="370" width="130" height="80" rx="12" fill="#FF4747" opacity="0.15"/>
  <text x="855" y="405" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#FF4747" text-anchor="middle">100+</text>
  <text x="855" y="430" font-family="Arial, sans-serif" font-size="14" fill="#7799BB" text-anchor="middle">files at once</text>
  <!-- Bottom bar -->
  <rect x="200" y="500" width="800" height="3" rx="1.5" fill="#FF4747" opacity="0.15"/>
  <!-- Format support text -->
  <text x="600" y="545" font-family="Arial, sans-serif" font-size="16" fill="#557799" text-anchor="middle">Supports PNG, WebP, BMP, TIFF, GIF, SVG, HEIC and more</text>
  <!-- Branding -->
  <text x="1160" y="600" font-family="Arial, sans-serif" font-size="16" fill="#FF4747" text-anchor="end" opacity="0.8">LoveConverts</text>
</svg>