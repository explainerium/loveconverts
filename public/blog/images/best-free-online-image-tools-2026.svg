<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="navyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#16213E"/>
    </linearGradient>
  </defs>

  <!-- Dark navy background -->
  <rect width="1200" height="630" fill="url(#navyBg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- Decorative glow circles -->
  <circle cx="100" cy="550" r="150" fill="#FF4747" opacity="0.05"/>
  <circle cx="1100" cy="80" r="120" fill="#FF4747" opacity="0.04"/>

  <!-- Title -->
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Best Free Image Tools</text>
  <rect x="470" y="105" width="260" height="40" rx="20" fill="#FF4747"/>
  <text x="600" y="133" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">2026 Edition</text>

  <!-- Tool Grid: Row 1 -->
  <!-- Compress -->
  <g transform="translate(120, 180)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Compress icon: arrows pointing inward -->
    <line x1="50" y1="35" x2="70" y2="55" stroke="#FF4747" stroke-width="3" stroke-linecap="round"/>
    <line x1="110" y1="35" x2="90" y2="55" stroke="#FF4747" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="95" x2="70" y2="75" stroke="#FF4747" stroke-width="3" stroke-linecap="round"/>
    <line x1="110" y1="95" x2="90" y2="75" stroke="#FF4747" stroke-width="3" stroke-linecap="round"/>
    <rect x="65" y="50" width="30" height="30" rx="4" fill="none" stroke="#FF4747" stroke-width="2"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Compress</text>
  </g>

  <!-- Resize -->
  <g transform="translate(320, 180)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Resize icon: expanding square with arrows -->
    <rect x="55" y="40" width="50" height="40" rx="4" fill="none" stroke="#22D3EE" stroke-width="2.5"/>
    <line x1="55" y1="80" x2="40" y2="95" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="105" y1="40" x2="120" y2="25" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="115,25 120,25 120,30" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="40,90 40,95 45,95" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Resize</text>
  </g>

  <!-- Crop -->
  <g transform="translate(520, 180)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Crop icon: L-shaped brackets -->
    <polyline points="55,85 55,40 100,40" fill="none" stroke="#A78BFA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="105,45 105,90 60,90" fill="none" stroke="#A78BFA" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Corner handles -->
    <rect x="52" y="37" width="8" height="8" rx="2" fill="#A78BFA"/>
    <rect x="100" y="85" width="8" height="8" rx="2" fill="#A78BFA"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Crop</text>
  </g>

  <!-- Convert -->
  <g transform="translate(720, 180)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Convert icon: two overlapping file types with arrow -->
    <rect x="45" y="35" width="35" height="45" rx="4" fill="none" stroke="#34D399" stroke-width="2.5"/>
    <text x="62" y="63" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34D399" text-anchor="middle">A</text>
    <line x1="87" y1="57" x2="107" y2="57" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="107,50 117,57 107,64" fill="#34D399"/>
    <rect x="80" y="45" width="35" height="45" rx="4" fill="none" stroke="#34D399" stroke-width="2.5" stroke-dasharray="4,3"/>
    <text x="97" y="73" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#34D399" text-anchor="middle">B</text>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Convert</text>
  </g>

  <!-- Watermark -->
  <g transform="translate(920, 180)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Watermark icon: image with text overlay -->
    <rect x="50" y="35" width="60" height="50" rx="6" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
    <text x="80" y="67" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#F59E0B" text-anchor="middle" opacity="0.7">Aa</text>
    <line x1="50" y1="75" x2="110" y2="45" stroke="#F59E0B" stroke-width="1" opacity="0.4"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Watermark</text>
  </g>

  <!-- Tool Grid: Row 2 -->
  <!-- Background Remove -->
  <g transform="translate(120, 340)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- BG remove: person silhouette with checkered bg -->
    <rect x="55" y="30" width="50" height="60" rx="4" fill="none" stroke="#EC4899" stroke-width="2"/>
    <circle cx="80" cy="47" r="8" fill="#EC4899" opacity="0.5"/>
    <path d="M65,75 Q72,55 80,58 Q88,55 95,75" fill="#EC4899" opacity="0.5"/>
    <!-- Checkered pattern hint -->
    <rect x="97" y="30" width="8" height="8" fill="#EC4899" opacity="0.2"/>
    <rect x="97" y="46" width="8" height="8" fill="#EC4899" opacity="0.2"/>
    <rect x="97" y="62" width="8" height="8" fill="#EC4899" opacity="0.2"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">BG Remove</text>
  </g>

  <!-- Rotate -->
  <g transform="translate(320, 340)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Rotate icon: circular arrow -->
    <path d="M60,65 A25,25 0 1,1 100,65" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round"/>
    <polygon points="95,55 105,65 95,72" fill="#06B6D4"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Rotate</text>
  </g>

  <!-- Upscale -->
  <g transform="translate(520, 340)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Upscale icon: small image becoming large with sparkle -->
    <rect x="45" y="50" width="30" height="25" rx="3" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="82" y="35" width="45" height="38" rx="4" fill="none" stroke="#8B5CF6" stroke-width="2.5"/>
    <line x1="78" y1="63" x2="82" y2="54" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="3,2"/>
    <!-- Sparkle -->
    <line x1="118" y1="30" x2="118" y2="42" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    <line x1="112" y1="36" x2="124" y2="36" stroke="#8B5CF6" stroke-width="2" stroke-linecap="round"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Upscale</text>
  </g>

  <!-- PDF -->
  <g transform="translate(720, 340)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- PDF icon -->
    <rect x="58" y="32" width="44" height="56" rx="4" fill="none" stroke="#EF4444" stroke-width="2.5"/>
    <polyline points="88,32 88,48 102,48" fill="none" stroke="#EF4444" stroke-width="2" stroke-linejoin="round"/>
    <text x="80" y="70" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#EF4444" text-anchor="middle">PDF</text>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">PDF Tools</text>
  </g>

  <!-- Batch -->
  <g transform="translate(920, 340)">
    <rect width="160" height="130" rx="16" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <!-- Batch icon: stacked images -->
    <rect x="60" y="32" width="44" height="34" rx="4" fill="none" stroke="#10B981" stroke-width="2"/>
    <rect x="55" y="38" width="44" height="34" rx="4" fill="none" stroke="#10B981" stroke-width="2" opacity="0.6"/>
    <rect x="50" y="44" width="44" height="34" rx="4" fill="none" stroke="#10B981" stroke-width="2" opacity="0.3"/>
    <!-- Checkmark -->
    <polyline points="90,65 97,73 112,55" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="80" y="122" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Batch</text>
  </g>

  <!-- Subtitle -->
  <text x="600" y="540" font-family="Arial, sans-serif" font-size="20" fill="#64748B" text-anchor="middle">No signup required. Works in your browser.</text>

  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#475569" text-anchor="end" opacity="0.8">LoveConverts</text>
</svg>