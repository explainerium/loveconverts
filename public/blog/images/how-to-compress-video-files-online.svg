<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="darkGrad10" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A14"/>
      <stop offset="100%" style="stop-color:#141428"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#darkGrad10)"/>
  <!-- Green accent glow -->
  <circle cx="600" cy="350" r="300" fill="#4CAF50" opacity="0.03"/>
  <circle cx="300" cy="200" r="150" fill="#4CAF50" opacity="0.02"/>
  <circle cx="900" cy="500" r="150" fill="#4CAF50" opacity="0.02"/>
  <!-- Title -->
  <text x="600" y="95" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Compress Video</text>
  <text x="600" y="150" font-family="Arial, sans-serif" font-size="54" font-weight="bold" fill="#4CAF50" text-anchor="middle">Files</text>
  <text x="600" y="190" font-family="Arial, sans-serif" font-size="20" fill="#666688" text-anchor="middle">Reduce file size while keeping quality</text>
  <!-- Video player frame -->
  <rect x="300" y="230" width="600" height="340" rx="16" fill="#1A1A30" stroke="#2A2A4A" stroke-width="2"/>
  <!-- Player top bar -->
  <rect x="300" y="230" width="600" height="40" rx="16" fill="#222240"/>
  <rect x="300" y="254" width="600" height="16" fill="#222240"/>
  <!-- Window dots -->
  <circle cx="330" cy="250" r="6" fill="#FF5F57"/>
  <circle cx="352" cy="250" r="6" fill="#FEBC2E"/>
  <circle cx="374" cy="250" r="6" fill="#28C840"/>
  <!-- Video content area -->
  <rect x="320" y="280" width="560" height="250" rx="4" fill="#0F0F20"/>
  <!-- Video scene: gradient sky -->
  <rect x="320" y="280" width="560" height="125" fill="#1A2A44"/>
  <!-- Simple landscape -->
  <polygon points="320,405 450,330 560,380 680,310 800,360 880,405" fill="#1E3322" opacity="0.6"/>
  <polygon points="320,405 400,360 500,390 600,340 720,380 880,405" fill="#2A4A30"/>
  <!-- Stars -->
  <circle cx="400" cy="310" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="500" cy="295" r="1.5" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="650" cy="305" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="750" cy="290" r="1.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="820" cy="310" r="1" fill="#FFFFFF" opacity="0.5"/>
  <!-- Play button -->
  <circle cx="600" cy="390" r="35" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="600" cy="390" r="30" fill="#4CAF50" opacity="0.8"/>
  <polygon points="590,375 590,405 615,390" fill="#FFFFFF"/>
  <!-- Progress bar -->
  <rect x="340" y="500" width="520" height="6" rx="3" fill="#2A2A4A"/>
  <rect x="340" y="500" width="200" height="6" rx="3" fill="#4CAF50"/>
  <circle cx="540" cy="503" r="8" fill="#4CAF50"/>
  <!-- Time -->
  <text x="340" y="525" font-family="Arial, sans-serif" font-size="12" fill="#666688">2:34</text>
  <text x="848" y="525" font-family="Arial, sans-serif" font-size="12" fill="#666688" text-anchor="end">6:12</text>
  <!-- Compress arrows (top-right area of player) -->
  <g transform="translate(790, 290)">
    <!-- Inward pointing arrows (compress symbol) -->
    <line x1="0" y1="0" x2="20" y2="20" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <polyline points="8,0 0,0 0,8" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="60" y1="0" x2="40" y2="20" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <polyline points="52,0 60,0 60,8" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="50" x2="20" y2="30" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <polyline points="0,42 0,50 8,50" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="60" y1="50" x2="40" y2="30" stroke="#4CAF50" stroke-width="3" stroke-linecap="round"/>
    <polyline points="60,42 60,50 52,50" fill="none" stroke="#4CAF50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- File size comparison -->
  <g transform="translate(100, 320)">
    <rect x="0" y="0" width="150" height="70" rx="10" fill="#1A1A30" stroke="#FF4747" stroke-width="1.5"/>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="13" fill="#FF4747" text-anchor="middle">BEFORE</text>
    <text x="75" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FF4747" text-anchor="middle">250 MB</text>
  </g>
  <g transform="translate(100, 410)">
    <!-- Arrow down -->
    <line x1="75" y1="-10" x2="75" y2="5" stroke="#4CAF50" stroke-width="2"/>
    <polygon points="75,12 68,2 82,2" fill="#4CAF50"/>
  </g>
  <g transform="translate(100, 420)">
    <rect x="0" y="0" width="150" height="70" rx="10" fill="#1A1A30" stroke="#4CAF50" stroke-width="1.5"/>
    <text x="75" y="30" font-family="Arial, sans-serif" font-size="13" fill="#4CAF50" text-anchor="middle">AFTER</text>
    <text x="75" y="55" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#4CAF50" text-anchor="middle">45 MB</text>
  </g>
  <!-- Savings indicator -->
  <g transform="translate(940, 370)">
    <rect x="0" y="0" width="150" height="80" rx="12" fill="#4CAF50" opacity="0.15"/>
    <text x="75" y="35" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4CAF50" text-anchor="middle">82%</text>
    <text x="75" y="58" font-family="Arial, sans-serif" font-size="14" fill="#4CAF50" text-anchor="middle">smaller</text>
  </g>
  <!-- Supported formats -->
  <rect x="940" y="470" width="150" height="30" rx="15" fill="#1A1A30" stroke="#2A2A4A" stroke-width="1"/>
  <text x="1015" y="491" font-family="Arial, sans-serif" font-size="12" fill="#666688" text-anchor="middle">MP4 / MOV / AVI</text>
  <!-- Branding -->
  <text x="1160" y="600" font-family="Arial, sans-serif" font-size="16" fill="#4CAF50" text-anchor="end" opacity="0.8">LoveConverts</text>
</svg>