<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="tealbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488"/>
      <stop offset="100%" style="stop-color:#14B8A6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#tealbg)"/>
  <!-- Decorative triangle shapes -->
  <polygon points="1100,0 1200,0 1200,100" fill="#0F766E" opacity="0.4"/>
  <polygon points="0,530 0,630 100,630" fill="#0F766E" opacity="0.4"/>
  <!-- Grid of images being resized - different input sizes -->
  <!-- Row 1: various sizes input -->
  <rect x="100" y="140" width="100" height="140" rx="6" fill="#fff" opacity="0.9"/>
  <rect x="220" y="170" width="140" height="80" rx="6" fill="#fff" opacity="0.9"/>
  <rect x="380" y="150" width="80" height="120" rx="6" fill="#fff" opacity="0.9"/>
  <!-- Mini landscapes inside -->
  <rect x="108" y="150" width="84" height="80" rx="3" fill="#5EEAD4"/>
  <circle cx="130" cy="175" r="10" fill="#FBBF24"/>
  <rect x="228" y="180" width="124" height="40" rx="3" fill="#99F6E4"/>
  <rect x="388" y="160" width="64" height="70" rx="3" fill="#5EEAD4"/>
  <!-- Size labels -->
  <text x="150" y="300" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.7">800x1200</text>
  <text x="290" y="270" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.7">1400x600</text>
  <text x="420" y="290" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.7">500x900</text>
  <!-- Arrow down -->
  <rect x="200" y="320" width="200" height="40" rx="20" fill="#FF4747"/>
  <text x="300" y="346" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">RESIZE ALL</text>
  <!-- Row 2: uniform output sizes -->
  <rect x="100" y="390" width="110" height="110" rx="6" fill="#fff" opacity="0.95"/>
  <rect x="230" y="390" width="110" height="110" rx="6" fill="#fff" opacity="0.95"/>
  <rect x="360" y="390" width="110" height="110" rx="6" fill="#fff" opacity="0.95"/>
  <!-- Uniform landscapes -->
  <rect x="108" y="398" width="94" height="65" rx="3" fill="#99F6E4"/>
  <rect x="238" y="398" width="94" height="65" rx="3" fill="#5EEAD4"/>
  <rect x="368" y="398" width="94" height="65" rx="3" fill="#99F6E4"/>
  <!-- Uniform size labels -->
  <text x="155" y="520" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.7">800x800</text>
  <text x="285" y="520" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.7">800x800</text>
  <text x="415" y="520" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" opacity="0.7">800x800</text>
  <!-- Checkmarks -->
  <circle cx="195" cy="485" r="12" fill="#10B981"/>
  <polyline points="189,485 193,490 202,480" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="325" cy="485" r="12" fill="#10B981"/>
  <polyline points="319,485 323,490 332,480" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="455" cy="485" r="12" fill="#10B981"/>
  <polyline points="449,485 453,490 462,480" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Title -->
  <text x="820" y="250" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#fff" text-anchor="middle">Batch</text>
  <text x="820" y="330" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#fff" text-anchor="middle">Resize</text>
  <text x="820" y="410" font-family="Arial, sans-serif" font-size="58" font-weight="bold" fill="#042F2E" text-anchor="middle">Images</text>
  <text x="820" y="460" font-family="Arial, sans-serif" font-size="22" fill="#CCFBF1" text-anchor="middle">Hundreds at Once</text>
  <!-- Branding -->
  <text x="1150" y="600" font-family="Arial, sans-serif" font-size="18" fill="#0F766E" text-anchor="end">LoveConverts</text>
</svg>